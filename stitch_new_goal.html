<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Flavos Forge - New Goal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;700&family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@100..900&family=Manrope:wght@100..900&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#36333c",
                        "secondary": "#71dc93",
                        "tertiary-container": "#ff874b",
                        "secondary-container": "#038647",
                        "on-tertiary-fixed": "#351000",
                        "on-surface": "#e6e0ec",
                        "on-secondary-fixed": "#00210d",
                        "on-primary-fixed": "#001f25",
                        "on-secondary-container": "#f6fff4",
                        "surface-bright": "#3b3841",
                        "surface": "#14121a",
                        "surface-container-highest": "#36333c",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "primary-container": "#22b8cf",
                        "primary-fixed": "#a1efff",
                        "on-secondary-fixed-variant": "#005229",
                        "tertiary-fixed-dim": "#ffb694",
                        "surface-tint": "#53d7ef",
                        "inverse-on-surface": "#322f38",
                        "on-tertiary-container": "#6b2800",
                        "outline": "#869396",
                        "inverse-primary": "#006876",
                        "surface-container-lowest": "#0f0d15",
                        "on-error": "#690005",
                        "primary-fixed-dim": "#53d7ef",
                        "on-primary-container": "#00444e",
                        "secondary-fixed": "#8df9ad",
                        "on-primary": "#00363e",
                        "background": "#14121a",
                        "surface-dim": "#14121a",
                        "on-tertiary": "#571f00",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed": "#ffdbcc",
                        "on-background": "#e6e0ec",
                        "error": "#ffb4ab",
                        "surface-container-low": "#1d1a23",
                        "outline-variant": "#3d494c",
                        "error-container": "#93000a",
                        "surface-container-high": "#2b2931",
                        "surface-container": "#211e27",
                        "inverse-surface": "#e6e0ec",
                        "on-surface-variant": "#bcc9cc",
                        "tertiary": "#ffb694",
                        "on-secondary": "#00391b",
                        "on-primary-fixed-variant": "#004e5a",
                        "secondary-fixed-dim": "#71dc93",
                        "primary": "#53d7ef"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "4px",
                        "container-max": "1200px",
                        "margin-mobile": "16px",
                        "stack-lg": "48px",
                        "margin-desktop": "64px",
                        "stack-sm": "8px",
                        "stack-md": "24px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "body-md": ["Manrope"],
                        "display-lg": ["Bricolage Grotesque"],
                        "data-label": ["IBM Plex Mono"],
                        "headline-md": ["Bricolage Grotesque"],
                        "data-value": ["IBM Plex Mono"],
                        "display-lg-mobile": ["Bricolage Grotesque"],
                        "body-lg": ["Manrope"]

                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "data-label": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500" }],

                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }]

                }
            }
        }

<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        
        /* Focus styles for inputs */
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #53d7ef; /* primary color */
            box-shadow: 0 0 0 1px #53d7ef;
        }

        /* Hide scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#15131B] text-on-surface font-body-md antialiased min-h-screen selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation (Transactional, Back button only) -->
<header class="fixed top-0 w-full z-50 bg-[#15131B]/80 backdrop-blur-xl border-b border-white/5 flex items-center justify-between px-margin-mobile md:px-margin-desktop h-16 max-w-container-max mx-auto left-0 right-0">
<button class="flex items-center text-on-surface-variant hover:text-primary transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">New Goal</h1>
<div class="w-6"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="pt-24 pb-32 px-margin-mobile md:px-margin-desktop max-w-2xl mx-auto flex flex-col gap-stack-md">
<!-- Form Section -->
<section class="flex flex-col gap-stack-md">
<!-- Goal Title -->
<div class="flex flex-col gap-stack-sm">
<label class="font-data-label text-data-label text-on-surface-variant uppercase tracking-wider" for="goal_title">Goal Title</label>
<input class="bg-[#272232] border border-white/[0.08] rounded-DEFAULT p-4 text-on-surface font-body-lg placeholder:text-on-surface-variant/50 transition-all focus:border-primary focus:ring-1 focus:ring-primary w-full" id="goal_title" placeholder="e.g. Master React in 3 months" type="text"/>
</div>
<!-- Specific Outcome -->
<div class="flex flex-col gap-stack-sm">
<label class="font-data-label text-data-label text-on-surface-variant uppercase tracking-wider" for="specific_outcome">Goal-Setting Theory: What exactly will you achieve?</label>
<textarea class="bg-[#272232] border border-white/[0.08] rounded-DEFAULT p-4 text-on-surface font-body-md placeholder:text-on-surface-variant/50 transition-all focus:border-primary focus:ring-1 focus:ring-primary w-full resize-y" id="specific_outcome" placeholder="Define the end state clearly..." rows="3"></textarea>
</div>
<!-- Metric -->
<div class="flex flex-col gap-stack-sm">
<label class="font-data-label text-data-label text-on-surface-variant uppercase tracking-wider" for="metric">Mensurável: How will you track progress?</label>
<input class="bg-[#272232] border border-white/[0.08] rounded-DEFAULT p-4 text-on-surface font-body-md placeholder:text-on-surface-variant/50 transition-all focus:border-primary focus:ring-1 focus:ring-primary w-full" id="metric" placeholder="e.g. Complete 50 coding exercises" type="text"/>
</div>
<!-- Two Column Row: Difficulty & Deadline -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<!-- Difficulty Segmented Control -->
<div class="flex flex-col gap-stack-sm">
<label class="font-data-label text-data-label text-on-surface-variant uppercase tracking-wider">Difficulty</label>
<div class="flex bg-[#272232] p-1 rounded-DEFAULT border border-white/[0.08]">
<label class="flex-1 text-center">
<input checked="" class="peer sr-only" name="difficulty" type="radio" value="moderate"/>
<div class="py-3 cursor-pointer rounded-sm peer-checked:bg-surface-variant peer-checked:text-primary transition-colors font-data-label text-data-label text-on-surface-variant">Moderate</div>
</label>
<label class="flex-1 text-center">
<input class="peer sr-only" name="difficulty" type="radio" value="high"/>
<div class="py-3 cursor-pointer rounded-sm peer-checked:bg-surface-variant peer-checked:text-primary transition-colors font-data-label text-data-label text-on-surface-variant">High</div>
</label>
</div>
</div>
<!-- Deadline -->
<div class="flex flex-col gap-stack-sm">
<label class="font-data-label text-data-label text-on-surface-variant uppercase tracking-wider" for="deadline">Deadline</label>
<div class="relative">
<input class="bg-[#272232] border border-white/[0.08] rounded-DEFAULT p-4 text-on-surface font-body-md w-full transition-all focus:border-primary focus:ring-1 focus:ring-primary appearance-none [&::-webkit-calendar-picker-indicator]:invert [&::-webkit-calendar-picker-indicator]:opacity-50 hover:[&::-webkit-calendar-picker-indicator]:opacity-100 cursor-pointer" id="deadline" type="date"/>
</div>
</div>
</div>
</section>
<!-- Action Plan Section -->
<section class="bg-[#1E1B26] border border-white/[0.08] rounded-lg p-margin-mobile md:p-gutter flex flex-col gap-stack-md mt-4 relative overflow-hidden">
<!-- Decorative Accent -->
<div class="absolute top-0 left-0 w-full h-0.5 bg-primary/20"></div>
<header>
<h2 class="font-headline-md text-headline-md text-on-surface">Action Plan (If-Then)</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Implement implementation intentions to overcome friction.</p>
</header>
<div class="flex flex-col gap-stack-sm border border-white/[0.05] rounded-DEFAULT bg-surface/50 p-4">
<div class="flex items-center gap-3">
<span class="font-data-label text-data-label text-primary uppercase w-8">Se</span>
<input class="bg-transparent border-b border-white/[0.08] border-t-0 border-l-0 border-r-0 focus:border-primary focus:ring-0 w-full text-on-surface font-body-md placeholder:text-on-surface-variant/30 py-2 px-0" placeholder="[gatilho]" type="text"/>
</div>
<div class="flex items-center gap-3">
<span class="font-data-label text-data-label text-tertiary-container uppercase w-8">Então</span>
<input class="bg-transparent border-b border-white/[0.08] border-t-0 border-l-0 border-r-0 focus:border-tertiary-container focus:ring-0 w-full text-on-surface font-body-md placeholder:text-on-surface-variant/30 py-2 px-0" placeholder="[ação]" type="text"/>
</div>
</div>
<button class="flex items-center justify-center gap-2 text-on-surface-variant hover:text-primary transition-colors py-2 font-data-label text-data-label uppercase tracking-widest text-xs self-start opacity-70 hover:opacity-100">
<span class="material-symbols-outlined text-[18px]" data-icon="add">add</span>
                Add another condition
            </button>
</section>
</main>
<!-- Sticky Bottom Action Area -->
<div class="fixed bottom-0 left-0 right-0 bg-[#15131B]/90 backdrop-blur-xl border-t border-white/5 p-margin-mobile md:p-gutter z-50">
<div class="max-w-2xl mx-auto">
<button class="w-full bg-[#22B8CF] text-[#15131B] font-data-label text-data-label uppercase tracking-wider py-4 rounded-DEFAULT hover:bg-opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 font-bold shadow-[0_0_15px_rgba(34,184,207,0.2)]">
<span class="material-symbols-outlined" data-icon="check" style="font-variation-settings: 'FILL' 1;">check</span>
                Create Goal
            </button>
</div>
</div>
</body></html>
