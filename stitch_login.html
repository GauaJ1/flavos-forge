<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Flavos Forge</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&amp;family=IBM+Plex+Mono:wght@400;500&amp;family=Manrope:wght@400&amp;display=swap" rel="stylesheet"/>

                        "surface-container-high": "#2b2931",
                        "secondary-fixed": "#8df9ad",
                        "on-surface": "#e6e0ec",

                        "error": "#ffb4ab",
                        "on-secondary-container": "#f6fff4",
                        "primary-container": "#22b8cf",
                        "surface-dim": "#14121a",
                        "on-background": "#e6e0ec",
                        "outline-variant": "#3d494c",
                        "on-primary-container": "#00444e",
                        "on-secondary-fixed-variant": "#005229",
                        "on-secondary-fixed": "#00210d",
                        "inverse-on-surface": "#322f38",
                        "on-tertiary-container": "#6b2800",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#ffb694",

                        "on-error": "#690005",
                        "surface-container": "#211e27",

                        "surface-container-highest": "#36333c",
                        "surface-container-lowest": "#0f0d15",
                        "secondary-container": "#038647",

                        "error-container": "#93000a",
                        "background": "#14121a",
                        "surface-tint": "#53d7ef",
                        "on-primary-fixed-variant": "#004e5a",

                        "on-surface-variant": "#bcc9cc",
                        "surface": "#14121a",
                        "secondary-fixed-dim": "#71dc93",
                        "tertiary-container": "#ff874b",
                        "primary-fixed": "#a1efff",
                        "on-secondary": "#00391b",
                        "outline": "#869396",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "surface-container-low": "#1d1a23",
                        "on-primary-fixed": "#001f25",
                        "tertiary": "#ffb694"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "24px",
                        "unit": "4px",
                        "margin-mobile": "16px",
                        "margin-desktop": "64px",
                        "stack-lg": "48px",
                        "gutter": "24px",
                        "container-max": "1200px",
                        "stack-sm": "8px"
                    },
                    "fontFamily": {
                        "headline-md": ["Bricolage Grotesque"],
                        "display-lg": ["Bricolage Grotesque"],

<style>
        .ghost-border { border: 1px solid rgba(244,239,230,0.08); }
        .input-bg { background-color: #272232; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-margin-mobile antialiased selection:bg-primary-container selection:text-on-primary-container relative overflow-hidden">
<!-- Subtle background radial gradient for depth -->
<div class="absolute inset-0 pointer-events-none" style="background: radial-gradient(circle at 50% 0%, rgba(34, 184, 207, 0.05) 0%, transparent 50%);"></div>
<main class="w-full max-w-[420px] relative z-10">
<!-- Main Card -->
<div class="bg-surface-container rounded-xl p-stack-md sm:p-stack-lg ghost-border shadow-2xl relative overflow-hidden">
<!-- Logo / Brand Anchor -->
<div class="flex flex-col items-center mb-stack-lg">
<div class="w-12 h-12 rounded-lg bg-primary-container/10 flex items-center justify-center mb-4 ghost-border">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface uppercase tracking-widest text-center">
                    FLAVOS FORGE
                </h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-2">
                    Enter the sanctuary.
                </p>
</div>
<form class="flex flex-col gap-stack-md" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="flex flex-col gap-unit">
<label class="font-data-label text-data-label text-on-surface-variant uppercase" for="email">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-container transition-colors">mail</span>
<input class="w-full input-bg ghost-border rounded-lg pl-12 pr-4 py-3 sm:py-4 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="email" placeholder="agent@flavos.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-unit">
<div class="flex justify-between items-baseline">
<label class="font-data-label text-data-label text-on-surface-variant uppercase" for="password">Password</label>
<a class="font-data-value text-data-value text-primary-container hover:text-primary transition-colors" href="#">Esqueci minha senha</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-container transition-colors">lock</span>
<input class="w-full input-bg ghost-border rounded-lg pl-12 pr-12 py-3 sm:py-4 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors focus:outline-none flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="mt-4 w-full bg-primary-container text-surface-container-lowest font-data-label text-data-label uppercase py-4 rounded-lg flex items-center justify-center gap-2 hover:bg-primary transition-colors active:scale-[0.98]" type="submit">
                    Entrar
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<div class="mt-stack-md flex items-center gap-4">
<div class="h-px bg-white/10 flex-1"></div>
<span class="font-data-value text-data-value text-on-surface-variant uppercase tracking-widest">or</span>
<div class="h-px bg-white/10 flex-1"></div>
</div>
<!-- Secondary Action -->
<button class="mt-stack-md w-full transparent ghost-border text-on-surface font-data-label text-data-label uppercase py-4 rounded-lg flex items-center justify-center hover:bg-white/5 transition-colors active:scale-[0.98]" type="button">
                Criar conta
            </button>
</div>
</main>
<script>
        // Simple script to toggle password visibility
        document.querySelector('button[type="button"]').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('.material-symbols-outlined');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                icon.textContent = 'visibility';
            }
        });
    </script>
</body></html>
