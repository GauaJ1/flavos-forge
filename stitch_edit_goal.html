<style>
        body {
            background-color: #15131B;
            color: #e6e0ec;
            -webkit-font-smoothing: antialiased;
        }
        
        .ghost-border {
            border: 1px solid rgba(244,239,230,0.08);
        }

        .input-forge {
            background-color: #272232;
            border: 1px solid rgba(244,239,230,0.08);
            color: #e6e0ec;
            transition: border-color 0.2s ease;
        }

        .input-forge:focus {
            outline: none;
            border-color: #22B8CF;
            box-shadow: 0 0 0 1px #22B8CF;
        }

        .btn-forge {
            background-color: #22B8CF;
            color: #15131B;
            transition: transform 0.1s ease, background-color 0.2s ease;
        }

        .btn-forge:active {
            transform: scale(0.98);
        }

        .btn-forge:hover {
            background-color: #53d7ef;
        }
        
        .btn-secondary {
             background-color: transparent;
             border: 1px solid rgba(244,239,230,0.08);
             color: #e6e0ec;
             transition: transform 0.1s ease, border-color 0.2s ease;
        }
        
        .btn-secondary:active {
            transform: scale(0.98);
        }
        
        .btn-secondary:hover {
            border-color: rgba(244,239,230,0.2);
        }

        /* Hide scrollbar for clean look */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col font-body-md text-body-md relative overflow-x-hidden">
<!-- Top Navigation (Task-focused, so no full global nav per guidelines, just contextual header) -->
<header class="fixed top-0 w-full z-50 bg-[#15131B]/80 backdrop-blur-xl border-b border-white/5">
<div class="flex items-center justify-between px-margin-mobile md:px-margin-desktop h-16 w-full max-w-container-max mx-auto">
<button aria-label="Go back" class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface">Edit Goal</h1>
<button aria-label="Delete goal" class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-error/10 text-error transition-colors">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-32 px-margin-mobile md:px-margin-desktop w-full max-w-container-max mx-auto flex flex-col items-center">
<div class="w-full max-w-2xl flex flex-col gap-stack-md">
<!-- Basic Details Card -->
<section class="bg-[#1E1B26] ghost-border rounded-xl p-6 md:p-8 flex flex-col gap-stack-md">
<div class="flex flex-col gap-stack-sm">
<label class="font-data-label text-data-label text-on-surface-variant uppercase" for="goal-title">Goal Title</label>
<input class="input-forge rounded-lg px-4 py-3 font-body-lg text-body-lg w-full" id="goal-title" type="text" value="Master Deep Work"/>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-data-label text-data-label text-on-surface-variant uppercase" for="specific-outcome">Specific Outcome</label>
<textarea class="input-forge rounded-lg px-4 py-3 font-body-md text-body-md w-full resize-none" id="specific-outcome" rows="2">Complete 4 hours of uninterrupted focus daily</textarea>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<div class="flex flex-col gap-stack-sm">
<label class="font-data-label text-data-label text-on-surface-variant uppercase" for="metric">Metric</label>
<input class="input-forge rounded-lg px-4 py-3 font-body-md text-body-md w-full" id="metric" type="text" value="Hours tracked in Forge"/>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-data-label text-data-label text-on-surface-variant uppercase" for="deadline">Deadline</label>
<div class="relative">
<input class="input-forge rounded-lg px-4 py-3 font-body-md text-body-md w-full appearance-none" id="deadline" type="date" value="2024-12-31"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="calendar_today">calendar_today</span>
</div>
</div>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-data-label text-data-label text-on-surface-variant uppercase">Difficulty</label>
<div class="flex gap-4">
<button class="flex-1 py-3 rounded-lg btn-secondary font-data-label text-data-label">LOW</button>
<button class="flex-1 py-3 rounded-lg btn-secondary font-data-label text-data-label">MED</button>
<button class="flex-1 py-3 rounded-lg bg-[#272232] border border-[#22B8CF] text-[#22B8CF] font-data-label text-data-label">HIGH</button>
</div>
</div>
</section>
<!-- Action Plan Section -->
<section class="bg-[#1E1B26] ghost-border border-t-2 border-t-[#71dc93] rounded-xl p-6 md:p-8 flex flex-col gap-stack-md relative overflow-hidden">
<!-- Subtle background accent -->
<div class="absolute top-0 right-0 w-32 h-32 bg-secondary/5 rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none"></div>
<h2 class="font-headline-md text-headline-md text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-secondary" data-icon="bolt">bolt</span>
                    Action Plan (If-Then)
                </h2>
<p class="font-body-md text-body-md text-on-surface-variant">Define the specific behavioral trigger and response to ensure execution.</p>
<div class="flex flex-col gap-stack-sm bg-[#15131B] p-4 rounded-lg ghost-border mt-2">
<label class="font-data-label text-data-label text-on-surface-variant uppercase" for="if-condition">If (Trigger)</label>
<div class="flex items-center gap-2">
<span class="font-data-label text-data-label text-on-surface-variant">Se</span>
<input class="input-forge rounded-lg px-3 py-2 font-body-md text-body-md flex-grow" id="if-condition" type="text" value="eu sentar na mesa às 8h"/>
</div>
<label class="font-data-label text-data-label text-on-surface-variant uppercase mt-4" for="then-action">Then (Action)</label>
<div class="flex items-center gap-2">
<span class="font-data-label text-data-label text-on-surface-variant">então</span>
<input class="input-forge rounded-lg px-3 py-2 font-body-md text-body-md flex-grow" id="then-action" type="text" value="colocarei o celular no modo foco"/>
</div>
</div>
</section>
</div>
</main>
<!-- Fixed Bottom Action Bar for Save -->
<div class="fixed bottom-0 left-0 w-full bg-[#15131B]/90 backdrop-blur-xl border-t border-white/5 p-margin-mobile md:p-stack-md z-40 pb-safe">
<div class="max-w-2xl mx-auto w-full">
<button class="w-full btn-forge py-4 rounded-lg font-data-label text-data-label uppercase tracking-wider flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(34,184,207,0.2)]">
                Save Changes
                <span class="material-symbols-outlined" data-icon="check">check</span>
</button>
</div>
</div>
</body></html>
