<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Ambient decorative element -->
<div class="fixed inset-0 pointer-events-none overflow-hidden flex items-center justify-center z-0 opacity-20">
<div class="w-[800px] h-[800px] bg-primary-container/10 rounded-full blur-[120px]"></div>
</div>
<!-- Registration Card -->
<main class="w-full max-w-[440px] relative z-10">
<!-- Brand Header -->
<div class="text-center mb-stack-lg">
<h1 class="font-headline-md text-headline-md text-primary font-bold uppercase tracking-widest mb-2">FLAVOS FORGE</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Forge your path to high performance.</p>
</div>
<!-- Form Card -->
<div class="bg-surface-container border border-white/10 rounded-xl p-6 md:p-10 shadow-2xl backdrop-blur-sm">
<form action="#" class="flex flex-col gap-stack-md" method="POST">
<!-- Name Field -->
<div class="flex flex-col gap-unit">
<label class="font-data-label text-data-label text-on-surface-variant uppercase" for="name">Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant opacity-70">person</span>
<input class="w-full bg-surface-container-highest border border-white/5 rounded-lg pl-12 pr-4 py-3.5 font-body-md text-body-md text-on-surface placeholder-on-surface-variant/40 focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="name" name="name" placeholder="Full Name" required="" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-unit">
<label class="font-data-label text-data-label text-on-surface-variant uppercase" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant opacity-70">email</span>
<input class="w-full bg-surface-container-highest border border-white/5 rounded-lg pl-12 pr-4 py-3.5 font-body-md text-body-md text-on-surface placeholder-on-surface-variant/40 focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="email" name="email" placeholder="you@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-unit">
<label class="font-data-label text-data-label text-on-surface-variant uppercase" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant opacity-70">lock</span>
<input class="w-full bg-surface-container-highest border border-white/5 rounded-lg pl-12 pr-4 py-3.5 font-body-md text-body-md text-on-surface placeholder-on-surface-variant/40 focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col gap-unit">
<label class="font-data-label text-data-label text-on-surface-variant uppercase" for="confirm_password">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant opacity-70">lock</span>
<input class="w-full bg-surface-container-highest border border-white/5 rounded-lg pl-12 pr-4 py-3.5 font-body-md text-body-md text-on-surface placeholder-on-surface-variant/40 focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="confirm_password" name="confirm_password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="mt-stack-sm w-full bg-primary-container text-on-primary-container font-data-label text-data-label uppercase py-4 rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex justify-center items-center gap-2" type="submit">
                    Registrar
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-stack-md text-center">
<a class="font-data-label text-data-label text-on-surface-variant hover:text-primary transition-colors border-b border-transparent hover:border-primary pb-1" href="#">
                    Já tenho uma conta. Fazer Login
                </a>
</div>
</div>
</main>
